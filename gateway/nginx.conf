worker_processes 1;
events {
    worker_connections 1024;
}
http {
    resolver 127.0.0.11 valid=30s ipv6=off;
    server {
        listen 80;

        location /user/ {
            set $upstream http://user:8000;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /account/ {
            set $upstream http://account:8000;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /transaction/ {
            set $upstream http://transaction:8000;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /fraud/ {
            set $upstream http://fraud:8000;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /notification/ {
            set $upstream http://notification:8000;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location / {
            return 200 '{"status":"running"}';
            add_header Content-Type application/json;
        }
    }
}
