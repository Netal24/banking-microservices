worker_processes auto;
events { worker_connections 1024; }
http {
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    upstream user_service        { server user:8000; }
    upstream account_service     { server account:8000; }
    upstream transaction_service { server transaction:8000; }
    upstream fraud_service       { server fraud:8000; }
    upstream notification_service { server notification:8000; }
    server {
        listen 80;
        location /user/        { limit_req zone=api burst=20 nodelay; proxy_pass http://user_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /account/     { limit_req zone=api burst=20 nodelay; proxy_pass http://account_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /transaction/ { limit_req zone=api burst=10 nodelay; proxy_pass http://transaction_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /fraud/       { limit_req zone=api burst=10 nodelay; proxy_pass http://fraud_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /notification/{ limit_req zone=api burst=20 nodelay; proxy_pass http://notification_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /healthz      { return 200 '{"status":"ok"}'; add_header Content-Type application/json; }
    }
}
