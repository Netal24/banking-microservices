global:
  scrape_interval: 5s
scrape_configs:
  - job_name: user_service
    static_configs:
      - targets: ['user:8000']
    metrics_path: '/metrics'
  - job_name: account_service
    static_configs:
      - targets: ['account:8000']
    metrics_path: '/metrics'
  - job_name: transaction_service
    static_configs:
      - targets: ['transaction:8000']
    metrics_path: '/metrics'
  - job_name: fraud_service
    static_configs:
      - targets: ['fraud:8000']
    metrics_path: '/metrics'
  - job_name: notification_service
    static_configs:
      - targets: ['notification:8000']
    metrics_path: '/metrics'
